name: pdf-selftest

# One-off diagnostic: does GitHub's runner IP reach NSE's PDF archive and extract
# text? Run manually (Actions -> pdf-selftest -> Run workflow), then read the log.
on:
  workflow_dispatch: {}

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Read NSE filing PDFs from the runner IP
        run: |
          python - <<'PY'
          from src.ingestion.nse_announcements import fetch_nse_market_wide
          from src.ingestion.pdf_extract import extract_pdf_text
          arts = fetch_nse_market_wide(hours_back=36)
          print(f"NSE feed from GitHub IP: {len(arts)} filings")
          tried = ok = 0
          for a in arts:
              if not a.attachment_url:
                  continue
              tried += 1
              txt = extract_pdf_text(a.attachment_url)
              print(f"  {a.ticker}: {'OK '+str(len(txt))+' chars' if txt else 'FAILED (no text/blocked)'}")
              if txt:
                  ok += 1
              if tried >= 6:
                  break
          print(f"RESULT: {ok}/{tried} PDFs readable from GitHub's IP")
          PY
