name: evaluate-selftest

# One-off, READ-ONLY diagnostic: restore the real production DB (same cache
# key prefix the news-scan loop uses) and run evaluate.py against it, printing
# the actual track record to the job log. Does NOT save the cache back, so it
# can never mutate or race with the live news-scan loop.
on:
  workflow_dispatch: {}

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore production DB (read-only)
        uses: actions/cache/restore@v4
        with:
          path: stock_news.db
          key: news-db-nonexistent-key-forces-prefix-match
          restore-keys: news-db-

      - name: Diagnose yfinance connectivity from THIS runner IP
        run: |
          python - <<'PY'
          import warnings, time
          warnings.filterwarnings("ignore")
          import yfinance as yf
          from src.scoring.market_data import get_quote, get_forward_return
          from datetime import datetime, timezone, timedelta

          # Known-good large-caps that DO have data locally (confirmed earlier).
          # If these fail from the runner too, it's an IP/rate-limit issue, not
          # a genuine BSE-coverage gap.
          tickers = ["BEL.NS", "CARRARO.NS", "HCLTECH.NS", "RELIANCE.NS"]
          for tk in tickers:
              t0 = time.time()
              try:
                  h = yf.Ticker(tk).history(period="10d")
                  print(f"{tk}: raw history() -> {len(h)} rows in {time.time()-t0:.1f}s")
              except Exception as e:
                  print(f"{tk}: raw history() FAILED in {time.time()-t0:.1f}s: {e}")

              q = get_quote(tk)
              print(f"{tk}: get_quote() -> {q}")

              ret = get_forward_return(tk, datetime.now(timezone.utc) - timedelta(days=5), 1)
              print(f"{tk}: get_forward_return(5 days ago, 1d) -> {ret}")
              print()
          PY

      - name: Diagnose the specific unpriceable rows using their REAL published_at
        run: |
          python - <<'PY'
          import warnings
          warnings.filterwarnings("ignore")
          from datetime import datetime, timezone
          from sqlalchemy import select
          from src.storage.db import get_session
          from src.storage.models import Article
          from src.scoring.market_data import get_forward_return
          from src.scoring.outcomes import _HORIZONS, _MAX_TRACK_AGE_DAYS

          session = get_session()
          now = datetime.now(timezone.utc)

          # Total backlog size per horizon: how many rows are eligible for a fill
          # (this tells us if it's a batching/limit backlog vs a per-row failure).
          for col_name, tdays, min_age in _HORIZONS:
              col = getattr(Article, col_name)
              from datetime import timedelta
              cutoff = now - timedelta(days=min_age)
              oldest = now - timedelta(days=_MAX_TRACK_AGE_DAYS)
              stmt = select(Article.id).where(
                  Article.alert_sent == True,
                  Article.published_at <= cutoff,
                  Article.published_at >= oldest,
                  col.is_(None),
              )
              n = len(list(session.execute(stmt)))
              print(f"backlog for {col_name}: {n} row(s) currently eligible for a fill")
          print()

          # Now test the SPECIFIC tickers that showed as unpriceable, using their
          # actual stored published_at (not an arbitrary test date).
          for tk in ["BEL.NS", "CARRARO.NS", "HCLTECH.NS", "SOMANYCERA.NS"]:
              stmt = select(Article).where(
                  Article.ticker == tk, Article.alert_sent == True, Article.ret_1d.is_(None)
              ).limit(3)
              rows = list(session.execute(stmt).scalars())
              if not rows:
                  print(f"{tk}: no NULL ret_1d rows found (already filled or none exist)")
                  continue
              for a in rows:
                  age_days = (now - a.published_at).total_seconds() / 86400
                  ret = get_forward_return(tk, a.published_at, 1)
                  print(f"{tk}: id={a.id} published_at={a.published_at} (age={age_days:.1f}d) -> get_forward_return={ret}")
          session.close()
          PY

      - name: Run evaluate.py at all three horizons
        run: |
          if [ ! -f stock_news.db ]; then
            echo "No cached DB found."
            exit 0
          fi
          ls -la stock_news.db
          echo "=== ret_1d ==="
          python evaluate.py --horizon ret_1d
          echo ""
          echo "=== ret_3d ==="
          python evaluate.py --horizon ret_3d
          echo ""
          echo "=== ret_5d ==="
          python evaluate.py --horizon ret_5d
