name: evaluate-selftest

# One-off, READ-ONLY diagnostic: restore the real production DB (same cache
# key prefix the news-scan loop uses) and run evaluate.py against it, printing
# the actual track record to the job log. Does NOT save the cache back, so it
# can never mutate or race with the live news-scan loop.
on:
  workflow_dispatch: {}

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore production DB (read-only)
        uses: actions/cache/restore@v4
        with:
          path: stock_news.db
          key: news-db-nonexistent-key-forces-prefix-match
          restore-keys: news-db-

      # Outcome backlog: how many alerted rows are still waiting on a fill per
      # horizon. Reported before the track record because a large backlog is the
      # difference between "genuinely unpriceable" and "just not fetched yet" —
      # misreading that once already sent us chasing a non-existent BSE-coverage
      # bug when the real cause was track_outcomes()'s batch limit.
      - name: Report outcome-fill backlog
        continue-on-error: true
        run: |
          if [ ! -f stock_news.db ]; then echo "No cached DB found."; exit 0; fi
          python - <<'PY'
          import warnings
          warnings.filterwarnings("ignore")
          from datetime import datetime, timedelta, timezone
          from sqlalchemy import or_, select
          from src.storage.db import get_session
          from src.storage.models import Article
          from src.scoring.outcomes import _HORIZONS, _MAX_TRACK_AGE_DAYS

          session = get_session()
          now = datetime.now(timezone.utc)
          oldest = now - timedelta(days=_MAX_TRACK_AGE_DAYS)
          for col_name, idx_col_name, _tdays, min_age in _HORIZONS:
              col = getattr(Article, col_name)
              idx_col = getattr(Article, idx_col_name)
              stmt = select(Article.id).where(
                  Article.alert_sent == True,  # noqa: E712
                  Article.published_at <= now - timedelta(days=min_age),
                  Article.published_at >= oldest,
                  or_(col.is_(None), idx_col.is_(None)),
              )
              n = len(list(session.execute(stmt)))
              print(f"backlog for {col_name}/{idx_col_name}: {n} row(s) eligible for a fill")
          session.close()
          PY

      - name: Run evaluate.py at all three horizons
        run: |
          if [ ! -f stock_news.db ]; then
            echo "No cached DB found."
            exit 0
          fi
          ls -la stock_news.db
          echo "=== ret_1d ==="
          python evaluate.py --horizon ret_1d
          echo ""
          echo "=== ret_3d ==="
          python evaluate.py --horizon ret_3d
          echo ""
          echo "=== ret_5d ==="
          python evaluate.py --horizon ret_5d
