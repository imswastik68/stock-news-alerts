name: news-scan

# GitHub throttles high-frequency free schedules hard (a */5 cron can get
# deprioritized to once every few hours). So instead of one scan per trigger,
# each triggered run stays alive and scans every 2 min for up to ~5 hours. Even
# if GitHub only fires the trigger sporadically, one long-running loop bridges
# the gap. cancel-in-progress means the newest trigger always wins (a fresh loop)
# and runs never pile up.
on:
  schedule:
    - cron: "0 * * * *"   # nominal hourly; GitHub honors it sporadically — the loop covers the gaps
  workflow_dispatch: {}

concurrency:
  group: news-scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 340   # under GitHub's 6h hard cap; loop below runs ~5h then exits cleanly
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Dedup state across runs. Within a single run the local DB gives perfect
      # dedup; this bridges it across run boundaries. Unique key per run + prefix
      # restore = rolling state that always re-saves.
      - name: Restore dedup DB
        uses: actions/cache/restore@v4
        with:
          path: stock_news.db
          key: news-db-${{ github.run_id }}
          restore-keys: news-db-

      - name: Ensure DB schema
        run: python init_db.py

      - name: Scan loop (every 2 min for ~5h)
        env:
          DRY_RUN: "false"
          LOG_LEVEL: INFO
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          end=$(( $(date +%s) + 300*60 ))   # loop for ~5 hours
          n=0
          while [ "$(date +%s)" -lt "$end" ]; do
            n=$((n+1))
            echo "::group::scan #$n at $(date -u +%H:%M:%SZ)"
            python -m src.pipeline --once || echo "cycle errored (continuing)"
            echo "::endgroup::"
            sleep 120
          done
          echo "loop finished after $n scans"

      - name: Save dedup DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: stock_news.db
          key: news-db-${{ github.run_id }}
